# Sparrow Mosquitto broker config — TLS listener (Issue 12.1).
#
# Generate certs first: ./generate-certs.sh (see README.md), which writes
# ca.crt/ca.key/server.crt/server.key into ./certs/.
#
# Broker ACLs (Issue 12.2) and per-agent credential provisioning are not
# configured here yet — this file covers transport security only.

listener 8883
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key

# Authentication (password_file) and authorization (acl_file) are Issue
# 12.2's scope, not this one — this listener currently allows anonymous
# connections once past the TLS handshake, same as before this issue.
# Issue 12.2 adds `allow_anonymous false` + `password_file` + `acl_file`
# here.
allow_anonymous true

persistence true
persistence_location /mosquitto/data/
log_dest stdout
