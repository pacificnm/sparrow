# Sparrow Mosquitto broker config — TLS listener (Issue 12.1) + auth/ACLs
# (Issue 12.2).
#
# Generate certs first: ./generate-certs.sh (see README.md), which writes
# ca.crt/ca.key/server.crt/server.key into ./certs/.
#
# Provision at least one user (sparrow-server) and one per agent host_id
# before starting the broker with this config: ./provision-user.sh (see
# README.md) — password_file must exist or Mosquitto refuses to start.

listener 8883
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key

allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl.conf

persistence true
persistence_location /mosquitto/data/
log_dest stdout
