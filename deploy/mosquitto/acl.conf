# Sparrow Mosquitto broker ACLs (Issue 12.2), scoped per the Phase 4 topic
# taxonomy (crates/sparrow-core/src/transport.rs's Topics).
#
# The phase-12 spec's own sketch used `user agent-%u` — verified against
# Mosquitto's real ACL file syntax (mosquitto-conf(5)) that this is invalid:
# `user <name>` matches an exact literal username only, `%u` substitution
# is not usable there. The correct directive for "each connecting user gets
# access scoped to their own username" is `pattern`, which applies globally
# to every authenticated user regardless of any `user` block — so it's not
# nested under a `user` line, unlike the spec's sketch implied.
#
# Every agent connects with its MQTT username set to its own host_id
# (crates/agent/src/main.rs's build_mqtt_config, wired in this same issue) —
# %u below substitutes that. sparrow-server (once it has a real connection
# point — see the "sparrow-server" section of this issue's PR) is the one
# principal that needs broader access than its own pattern-substituted
# topics, so it also gets an explicit `user sparrow-server` block.

# Every agent can only write its own register/heartbeat/data, and read its
# own config/command — applies to any connecting username, including
# sparrow-server itself (harmless: it only grants sparrow-server access to
# the literal, never-used "sparrow/agents/sparrow-server/..." topics, not
# to any real agent's topics).
pattern write sparrow/agents/%u/register
pattern write sparrow/agents/%u/heartbeat
pattern write sparrow/agents/%u/data
pattern read sparrow/agents/%u/config
pattern read sparrow/agents/%u/command

# The server has broader access — reads every agent's register/heartbeat/
# data, and writes config/command for any agent. Exact-match on the literal
# username "sparrow-server" (provisioned via provision-user.sh), additive
# on top of the pattern rules above.
user sparrow-server
topic read sparrow/agents/+/register
topic read sparrow/agents/+/heartbeat
topic read sparrow/agents/+/data
topic write sparrow/agents/+/config
topic write sparrow/agents/+/command
